name : workflow

on :
    push :
        branches :
            - main
        paths-ignore :
            - 'README.md' 

jobs :
    integration:
        name: Continuous Integration
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Lint code
              run: echo "Linting repository..."
              
            # - name: Run unit tests
            #   run: echo "Running unit tests..."
    
    build_and_push_docker_image_to_ecr:
      name: Continuous Delivery
      runs-on: ubuntu-latest
      needs: integration
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2  
          
        - name: Build, Tag, and Push Docker Image to ECR
          id: build-and-push-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
            IMAGE_TAG: latest
          run: |
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            echo "::set-output name=image_uri::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

    deploy_to_ecs:
      name: Continuous_Deployment
      runs-on: self-hosted
      needs: build_and_push_docker_image_to_ecr
      
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: pull latest docker image
          run: |
            docker pull ${{ steps.build-and-push-image.outputs.image_uri }}  
        
        - name: Run docker image to serve user requests
          run: |
            docker run -d -p 80:8000 ${{ steps.build-and-push-image.outputs.image_uri }}   
            
        - name: Clean previous docker images
          run: |
            docker image prune -f    

